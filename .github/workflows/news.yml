name: market-news
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: market-news
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run market-news monitor
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python fetch_and_publish.py
      - name: Save page and memory
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/index.html state.json
          git diff --quiet --staged || git commit -m "news update"
          git push
